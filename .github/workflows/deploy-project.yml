name: Deploy project

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-project.yml"
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_BACKEND_WEBAPP_NAME: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
  AZURE_FRONTEND_WEBAPP_NAME: ${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  BACKEND_PACKAGE: backend-deploy.zip

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: python -m pytest

      - name: Create backend deployment package
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          zip -r ../${{ env.BACKEND_PACKAGE }} . \
            -x '.git/*' \
            -x '.venv/*' \
            -x '__pycache__/*' \
            -x '.pytest_cache/*' \
            -x 'selldonut.db'

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure backend startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_BACKEND_WEBAPP_NAME" \
              --startup-file "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

      - name: Enable build during backend deployment
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_BACKEND_WEBAPP_NAME" \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_BACKEND_WEBAPP_NAME }}
          package: ${{ env.BACKEND_PACKAGE }}

  frontend:
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set backend URL on the frontend app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_FRONTEND_WEBAPP_NAME" \
              --settings \
                NEXT_PUBLIC_BACKEND_URL='${{ secrets.NEXT_PUBLIC_BACKEND_URL }}' \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Configure frontend startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_FRONTEND_WEBAPP_NAME" \
              --startup-file "npm start"

      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_FRONTEND_WEBAPP_NAME }}
          package: ${{ env.FRONTEND_DIR }}
